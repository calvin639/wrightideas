AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Memories in Stone - Backend API
  Handles orders, payments, file uploads, AI video generation, and montage building.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Deployment environment

  FrontendUrl:
    Type: String
    Default: https://memories.wrightideas.biz
    Description: Frontend URL for CORS and redirects

  SesFromEmail:
    Type: String
    Default: noreply@wrightideas.biz
    Description: Verified SES sender email (domain must be verified in SES)

  StripeSecretKey:
    Type: String
    NoEcho: true
    Description: Stripe secret key (sk_test_... or sk_live_...)

  RunwayApiKey:
    Type: String
    NoEcho: true
    Description: Runway ML API key

  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: whsec_placeholder_update_after_first_deploy
    Description: Stripe webhook signing secret

  RunwayWebhookUrl:
    Type: String
    Default: https://placeholder/webhooks/runway
    Description: Full URL for Runway ML callbacks (update after first deploy)

Globals:
  Function:
    Runtime: python3.12
    Architectures: [x86_64]
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        ORDERS_TABLE: !Ref OrdersTable
        UPLOADS_BUCKET: !Ref UploadsBucket
        VIDEOS_BUCKET: !Ref VideosBucket
        VIDEO_GENERATION_QUEUE_URL: !Ref VideoGenerationQueue
        MONTAGE_QUEUE_URL: !Ref MontageQueue
        FRONTEND_URL: !Ref FrontendUrl
        VIDEOS_CF_URL: !Sub 'https://${VideosCloudFrontDistribution.DomainName}'
        SES_FROM_EMAIL: !Ref SesFromEmail
        # Secrets passed as NoEcho parameters at deploy time — encrypted at rest by Lambda KMS
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        RUNWAY_API_KEY: !Ref RunwayApiKey
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
        RUNWAY_WEBHOOK_URL: !Ref RunwayWebhookUrl
    Layers:
      - !Ref DependenciesLayer
  Api:
    Cors:
      AllowOrigin: !Sub "'${FrontendUrl}'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Requested-With'"
      AllowMethods: "'GET,POST,OPTIONS'"

# ─── RESOURCES ────────────────────────────────────────────────────────────────

Resources:

  # ── API GATEWAY ──────────────────────────────────────────────────────────────

  MemoriesApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendUrl
          - http://localhost:3000
          - https://calvin639.github.io
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Requested-With
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 86400

  # ── LAMBDA LAYER (shared dependencies) ───────────────────────────────────────

  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub 'memories-dependencies-${Environment}'
      Description: Shared Python dependencies for Memories in Stone
      ContentUri: layers/dependencies/
      CompatibleRuntimes:
        - python3.12
      CompatibleArchitectures:
        - x86_64
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: makefile

  # ── DYNAMODB TABLE ────────────────────────────────────────────────────────────

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'memories-orders-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: MemoriesInStone
        - Key: Environment
          Value: !Ref Environment

  # ── SES DOMAIN IDENTITY ───────────────────────────────────────────────────────

  SesEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: wrightideas.biz
      DkimAttributes:
        SigningEnabled: true

  # ── S3 BUCKETS ────────────────────────────────────────────────────────────────

  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'memories-uploads-${Environment}-${AWS::AccountId}'
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref FrontendUrl
              - http://localhost:3000
              - https://calvin639.github.io
            AllowedMethods: [GET, PUT, POST]
            AllowedHeaders: ['*']
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: DeleteRawUploadsAfter30Days
            Status: Enabled
            ExpirationInDays: 30
            Prefix: uploads/
      Tags:
        - Key: Project
          Value: MemoriesInStone

  VideosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'memories-videos-${Environment}-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: MemoriesInStone

  VideosBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: VideosCloudFrontDistribution
    Properties:
      Bucket: !Ref VideosBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${VideosBucket}/*'
            Condition:
              ArnLike:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${VideosCloudFrontDistribution}'

  # ── CLOUDFRONT (Videos) ───────────────────────────────────────────────────────

  VideosOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'memories-videos-oac-${Environment}'
        Description: OAC for Memories in Stone videos bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  VideosCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub 'Memories in Stone — Videos CDN (${Environment})'
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        DefaultCacheBehavior:
          TargetOriginId: VideosBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (AWS managed)
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # CORS-S3Origin (AWS managed)
        Origins:
          - Id: VideosBucketOrigin
            DomainName: !GetAtt VideosBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !GetAtt VideosOAC.Id
      Tags:
        - Key: Project
          Value: MemoriesInStone
        - Key: Environment
          Value: !Ref Environment

  # ── SQS QUEUES ────────────────────────────────────────────────────────────────

  VideoGenerationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'memories-video-gen-dlq-${Environment}'
      MessageRetentionPeriod: 1209600  # 14 days

  VideoGenerationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'memories-video-generation-${Environment}'
      VisibilityTimeout: 600  # 10 min (must be >= 6x Lambda timeout)
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt VideoGenerationDLQ.Arn
        maxReceiveCount: 3

  MontageDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'memories-montage-dlq-${Environment}'
      MessageRetentionPeriod: 1209600

  MontageQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'memories-montage-${Environment}'
      VisibilityTimeout: 1800  # 30 min (FFmpeg can take a while)
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt MontageDLQ.Arn
        maxReceiveCount: 3

  # ── SHARED IAM ROLE ───────────────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'memories-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MemoriesLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt OrdersTable.Arn
                  - !Sub '${OrdersTable.Arn}/index/*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GeneratePresignedUrl
                Resource:
                  - !Sub '${UploadsBucket.Arn}/*'
                  - !Sub '${VideosBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt VideoGenerationQueue.Arn
                  - !GetAtt MontageQueue.Arn
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: '*'
              # Secrets are injected as Lambda env vars at deploy time — no Secrets Manager needed at runtime

  # ── API FUNCTIONS ─────────────────────────────────────────────────────────────

  CreateOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'memories-create-order-${Environment}'
      CodeUri: src/
      Handler: functions.create_order.handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Create a new memorial stone order and generate S3 presigned upload URLs
      Events:
        CreateOrder:
          Type: HttpApi
          Properties:
            ApiId: !Ref MemoriesApi
            Path: /orders
            Method: POST

  GetOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'memories-get-order-${Environment}'
      CodeUri: src/
      Handler: functions.get_order.handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Get order status and details
      Events:
        GetOrder:
          Type: HttpApi
          Properties:
            ApiId: !Ref MemoriesApi
            Path: /orders/{order_id}
            Method: GET

  CreateCheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'memories-create-checkout-${Environment}'
      CodeUri: src/
      Handler: functions.create_checkout.handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Create a Stripe Checkout session for an order
      Events:
        CreateCheckout:
          Type: HttpApi
          Properties:
            ApiId: !Ref MemoriesApi
            Path: /orders/{order_id}/checkout
            Method: POST

  StripeWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'memories-stripe-webhook-${Environment}'
      CodeUri: src/
      Handler: functions.stripe_webhook.handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Handle Stripe payment webhooks
      Events:
        StripeWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref MemoriesApi
            Path: /webhooks/stripe
            Method: POST

  RunwayWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'memories-runway-webhook-${Environment}'
      CodeUri: src/
      Handler: functions.runway_webhook.handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Handle Runway ML task completion webhooks
      Events:
        RunwayWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref MemoriesApi
            Path: /webhooks/runway
            Method: POST

  # ── PROCESSING FUNCTIONS ──────────────────────────────────────────────────────

  VideoGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'memories-video-generator-${Environment}'
      CodeUri: src/
      Handler: functions.video_generator.handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Submit files to Runway ML for image-to-video conversion
      Timeout: 90
      MemorySize: 512
      Events:
        VideoGenerationQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt VideoGenerationQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

  MontageBuilderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'memories-montage-builder-${Environment}'
      CodeUri: src/
      Handler: functions.montage_builder.handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: Stitch generated clips into final memorial video using FFmpeg
      Timeout: 900   # 15 min max
      MemorySize: 3008
      EphemeralStorage:
        Size: 5120   # 5GB /tmp for video processing
      # DependenciesLayer is inherited from Globals — do NOT add it here again or Lambda will reject it.
      # Add your FFmpeg layer ARN here after deployment:
      # Layers:
      #   - arn:aws:lambda:eu-west-1:ACCOUNT_ID:layer:ffmpeg:1
      # See README for instructions on building the FFmpeg layer
      Events:
        MontageQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt MontageQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures

# ── OUTPUTS ────────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: API Gateway base URL
    Value: !Sub 'https://${MemoriesApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub 'memories-api-url-${Environment}'

  UploadsBucketName:
    Description: S3 bucket for customer uploads
    Value: !Ref UploadsBucket

  VideosBucketName:
    Description: S3 bucket for processed videos
    Value: !Ref VideosBucket

  OrdersTableName:
    Description: DynamoDB table name
    Value: !Ref OrdersTable

  VideoGenerationQueueUrl:
    Description: SQS queue for video generation jobs
    Value: !Ref VideoGenerationQueue

  MontageQueueUrl:
    Description: SQS queue for montage building jobs
    Value: !Ref MontageQueue

  VideosCloudfrontUrl:
    Description: CloudFront distribution URL for the videos bucket
    Value: !Sub 'https://${VideosCloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub 'memories-videos-cf-url-${Environment}'

  SesDkimRecord1:
    Description: DKIM CNAME to add to Cloudflare (record 1 of 3)
    Value: !Sub '${SesEmailIdentity.DkimDNSTokenName1}.wrightideas.biz -> ${SesEmailIdentity.DkimDNSTokenValue1}.dkim.amazonses.com'

  SesDkimRecord2:
    Description: DKIM CNAME to add to Cloudflare (record 2 of 3)
    Value: !Sub '${SesEmailIdentity.DkimDNSTokenName2}.wrightideas.biz -> ${SesEmailIdentity.DkimDNSTokenValue2}.dkim.amazonses.com'

  SesDkimRecord3:
    Description: DKIM CNAME to add to Cloudflare (record 3 of 3)
    Value: !Sub '${SesEmailIdentity.DkimDNSTokenName3}.wrightideas.biz -> ${SesEmailIdentity.DkimDNSTokenValue3}.dkim.amazonses.com'
